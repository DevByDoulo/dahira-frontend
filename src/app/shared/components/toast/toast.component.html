<div class="fixed bottom-6 right-6 z-[9999] flex flex-col gap-2 items-end pointer-events-none">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      [class]="bgClass(toast.type)"
      class="flex items-center gap-3 px-4 py-3 rounded-xl shadow-lg text-sm font-semibold border pointer-events-auto max-w-sm min-w-[260px]"
    >
      <span
        class="material-symbols-outlined text-[20px] shrink-0"
        style="font-variation-settings: 'FILL' 1"
      >{{ icon(toast.type) }}</span>
      <span class="flex-1 leading-snug">{{ toast.message }}</span>
      <button
        (click)="toastService.dismiss(toast.id)"
        class="ml-1 opacity-50 hover:opacity-100 shrink-0 transition-opacity"
      >
        <span class="material-symbols-outlined text-[16px]">close</span>
      </button>
    </div>
  }
</div>
