<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-transparent backdrop-blur-sm">
  <span class="text-xl font-bold text-on-surface">Dahira App</span>
</header>

<main class="w-full max-w-md mx-auto px-4 py-8">
  <div class="bg-surface-container-lowest login-card rounded-2xl border border-outline-variant/30 p-8 md:p-10 animate-fade-in">

    <!-- Logo -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-20 h-20 bg-primary-container rounded-2xl flex items-center justify-center mb-6 shadow-lg animate-scale-in">
        <span class="material-symbols-outlined text-on-primary-container text-5xl">diversity_3</span>
      </div>
      <h1 class="text-3xl font-bold text-on-surface text-center">Bienvenue</h1>
      <p class="text-base text-on-surface-variant text-center mt-2">Connectez-vous à votre Dahira</p>
    </div>

    <!-- Message de succès (ex: invitation acceptée) -->
    <div *ngIf="successMessage" class="mb-6 p-4 bg-secondary-container border border-secondary/20 rounded-xl flex items-center gap-3">
      <span class="material-symbols-outlined text-secondary text-[20px] shrink-0" style="font-variation-settings:'FILL' 1">check_circle</span>
      <span class="text-sm text-on-secondary-container font-medium">{{ successMessage }}</span>
    </div>

    <!-- Message d'erreur -->
    <div *ngIf="errorMessage" class="mb-6 p-4 bg-error/10 border border-error/30 rounded-lg flex items-center gap-3 animate-slide-down">
      <span class="material-symbols-outlined text-error text-xl">error</span>
      <span class="text-sm text-error font-medium">{{ errorMessage }}</span>
    </div>

    <!-- Formulaire -->
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="space-y-5">

      <div class="space-y-1">
        <label class="text-sm font-medium text-on-surface-variant block ml-1">Téléphone</label>
        <div class="relative flex items-center overflow-hidden rounded-lg border border-outline-variant focus-within:ring-2 focus-within:ring-primary/10 focus-within:border-primary transition-all bg-surface-container-lowest">
          <span class="material-symbols-outlined absolute left-3 text-outline z-10">phone</span>
          <input
            type="tel"
            name="telephone"
            [(ngModel)]="telephone"
            required
            placeholder="221771234567"
            class="w-full pl-10 pr-4 py-3 bg-transparent border-none outline-none text-base placeholder:text-outline-variant"
          />
        </div>
      </div>

      <!-- Mot de passe -->
      <div class="space-y-1">
        <label class="text-sm font-medium text-on-surface-variant block ml-1">Mot de passe</label>
        <div class="relative flex items-center overflow-hidden rounded-lg border border-outline-variant focus-within:ring-2 focus-within:ring-primary/10 focus-within:border-primary transition-all bg-surface-container-lowest">
          <span class="material-symbols-outlined absolute left-3 text-outline z-10">lock</span>
          <input
            [type]="showPassword ? 'text' : 'password'"
            name="password"
            [(ngModel)]="password"
            required
            placeholder="••••••••"
            class="w-full pl-10 pr-12 py-3 bg-transparent border-none outline-none text-base placeholder:text-outline-variant"
          />
          <button type="button" (click)="togglePassword()" class="absolute right-3 text-on-surface-variant hover:text-primary transition-colors z-10">
            <span class="material-symbols-outlined">{{ showPassword ? 'visibility' : 'visibility_off' }}</span>
          </button>
        </div>
      </div>

      <!-- Se souvenir / Mot de passe oublié -->
      <div class="flex items-center justify-between py-1">
        <label class="flex items-center gap-2 cursor-pointer group">
          <input type="checkbox" name="rememberMe" [(ngModel)]="rememberMe" class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary focus:ring-offset-0" />
          <span class="text-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Se souvenir de moi</span>
        </label>
        <a routerLink="/mot-de-passe-oublie" class="text-sm font-medium text-secondary hover:text-on-secondary-container transition-colors">Mot de passe oublié ?</a>
      </div>

      <!-- Bouton submit -->
      <button
        type="submit"
        [disabled]="isLoading"
        class="w-full bg-primary text-on-primary py-3.5 px-6 rounded-lg text-sm font-bold shadow-md hover:shadow-lg hover:opacity-90 active:scale-[0.98] transition-all duration-200 mt-4 flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <span *ngIf="isLoading" class="animate-spin">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        </span>
        <span>{{ isLoading ? 'Connexion...' : 'Se connecter' }}</span>
      </button>

    </form>

    <!-- Inscription -->
    <div class="text-center mt-8">
      <p class="text-base text-on-surface-variant">
        Pas encore de compte ?
        <a routerLink="/inscription" class="font-bold text-secondary hover:underline ml-1 transition-colors">Créer un Dahira</a>
      </p>
    </div>

  </div>

  <!-- Liens bas -->
  <div class="mt-8 flex flex-wrap justify-center gap-6 text-sm text-outline">
    <a href="#" class="hover:text-on-surface-variant transition-colors">Conditions d'utilisation</a>
    <a href="#" class="hover:text-on-surface-variant transition-colors">Confidentialité</a>
    <a href="#" class="hover:text-on-surface-variant transition-colors">Support</a>
  </div>
</main>

<footer class="fixed bottom-0 left-0 w-full py-6 px-6 bg-transparent pointer-events-none">
  <div class="opacity-50 text-sm text-on-surface-variant pointer-events-auto">
    © 2026 Dahira App. Tous droits réservés.
  </div>
</footer>
