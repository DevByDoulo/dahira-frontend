<aside class="w-64 h-full fixed left-0 top-0 bg-surface-container-lowest shadow-sm flex flex-col gap-2 p-6 z-50">
  <!-- Logo -->
  <div class="flex items-center gap-3 px-2 mb-16">
    <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center">
      <span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">account_balance</span>
    </div>
    <div>
      <h1 class="text-xl font-bold text-primary leading-tight">Dahira</h1>
      <p class="text-xs text-on-surface-muted">Modernist</p>
    </div>
  </div>

  <!-- Navigation principale -->
  <nav class="flex flex-col gap-1 flex-1">
    @for (item of navItems; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive=""
        #rla="routerLinkActive"
        [routerLinkActiveOptions]="{ exact: false }"
        [class]="rla.isActive
          ? 'flex items-center gap-3 px-4 py-3 bg-secondary-container text-on-secondary-container rounded-xl font-bold transition-all'
          : 'flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-low rounded-xl transition-all'"
      >
        <span class="material-symbols-outlined">{{ item.icon }}</span>
        <span class="text-base">{{ item.label }}</span>
      </a>
    }

  </nav>

  <!-- Paramètres collé en bas -->
  <div class="border-t border-outline-soft/30 pt-4">
    <a
      routerLink="/parametres"
      routerLinkActive=""
      #rlaSettings="routerLinkActive"
      [class]="rlaSettings.isActive
        ? 'flex items-center gap-3 px-4 py-3 bg-secondary-container text-on-secondary-container rounded-xl font-bold transition-all'
        : 'flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-low rounded-xl transition-all'"
    >
      <span class="material-symbols-outlined">settings</span>
      <span class="text-base">Paramètres</span>
    </a>
  </div>
</aside>

<!-- Zone principale -->
<main class="ml-64 min-h-screen">
  <!-- Header sticky -->
  <header class="w-full h-20 sticky top-0 z-40 bg-surface-bg-start/80 backdrop-blur-md flex justify-between items-center px-16">
    <!-- Barre de recherche -->
    <div class="relative">
      <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-xl">search</span>
      <input
        class="pl-10 pr-4 py-2 bg-surface-container rounded-xl border-none focus:ring-2 focus:ring-secondary w-64 transition-all duration-200 outline-none text-sm"
        placeholder="Rechercher..."
        type="text"
      />
    </div>

    <!-- Actions utilisateur -->
    <div class="flex items-center gap-6">
      <button class="relative p-2 text-on-surface-variant hover:text-secondary transition-colors">
        <span class="material-symbols-outlined">notifications</span>
        <span class="absolute top-2 right-2 w-2 h-2 bg-error rounded-full"></span>
      </button>

      <div class="flex items-center gap-3 pl-4 border-l border-outline-soft/30">
        <div class="text-right hidden sm:block">
          <p class="text-sm font-bold text-on-surface">{{ userFullName }}</p>
          <p class="text-xs text-on-surface-muted">{{ userRole }}</p>
        </div>
        <div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center font-bold text-sm text-on-secondary-container border-2 border-surface-container-highest">
          {{ userInitials }}
        </div>
        <button
          (click)="logout()"
          class="p-1 text-on-surface-variant hover:text-error transition-colors"
          title="Se déconnecter"
        >
          <span class="material-symbols-outlined text-xl">logout</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Contenu de la page injecté par le router -->
  <router-outlet />
</main>
